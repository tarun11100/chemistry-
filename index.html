<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Material Detective</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Poppins", Arial, sans-serif;
            background: linear-gradient(135deg, #ff6cb6, #0d2041);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .loader {
            text-align: center;
            color: white;
        }
        
        h1 {
            font-size: 2.5em;
            margin: 0;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="loader">
        <h1>Material Detective</h1>
        <p>Loading...</p>
    </div>
    
    <script>
        // Redirect to login page
        window.location.href = "login.html";
    </script>
</body>
</html>
